version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: farming_postgres
    environment:
      POSTGRES_USER:     farmer_user
      POSTGRES_PASSWORD: farmer_pass
      POSTGRES_DB:       farming_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmer_user -d farming_db"]
      interval: 10s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farming_backend
    environment:
      APP_ENV:             production
      DATABASE_URL:        postgresql+asyncpg://farmer_user:farmer_pass@postgres:5432/farming_db
      SYNC_DATABASE_URL:   postgresql://farmer_user:farmer_pass@postgres:5432/farming_db
      WATSONX_API_KEY:     ${WATSONX_API_KEY}
      WATSONX_PROJECT_ID:  ${WATSONX_PROJECT_ID}
      WATSONX_URL:         ${WATSONX_URL}
      GRANITE_MODEL_ID:    ${GRANITE_MODEL_ID}
      AGMARKNET_API_KEY:   ${AGMARKNET_API_KEY}
      SECRET_KEY:          ${SECRET_KEY}
      ALLOWED_ORIGINS:     "http://localhost:3000,http://farming-frontend:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farming_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
