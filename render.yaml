services:
  - type: web
    name: kisan-farming-advisor
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com
      - key: PORT
        value: 8000
